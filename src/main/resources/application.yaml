spring:
  application:
    name: shopflow

  datasource:
    url: jdbc:mysql://localhost:3306/shopflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  session:
    store-type: none

server:
  port: 8080